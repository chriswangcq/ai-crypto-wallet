name: Star Counter
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update star count badge
        run: |
          STARS=$(curl -s https://api.github.com/repos/chriswangcq/ai-crypto-wallet | jq -r .stargazers_count)
          echo "Current stars: $STARS"
